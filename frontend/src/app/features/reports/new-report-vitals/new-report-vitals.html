<div class="container">
  <h2>Step 1: Enter Physical Vitals</h2>

  <div class="form-group">
    <label>Height (cm)</label>
    <input type="number" [(ngModel)]="height" />
  </div>

  <div class="form-group">
    <label>Weight (kg)</label>
    <input type="number" [(ngModel)]="weight" />
  </div>

  <div class="form-group">
    <label>Systolic BP</label>
    <input type="number" [(ngModel)]="systolic" />
  </div>

  <div class="form-group">
    <label>Diastolic BP</label>
    <input type="number" [(ngModel)]="diastolic" />
  </div>

  <button (click)="saveVitals()">Next</button>
</div>
