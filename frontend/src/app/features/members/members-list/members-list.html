<div class="page-container">

  <!-- Breadcrumb and Action -->
  <header class="page-header">
    <nav class="breadcrumb">
      <span class="crumb">App</span>
      <span class="separator">/</span>
      <span class="active">Members</span>
    </nav>
    <button class="btn btn-primary" (click)="addMember()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="8.5" cy="7" r="4"></circle>
        <line x1="20" y1="8" x2="20" y2="14"></line>
        <line x1="17" y1="11" x2="23" y2="11"></line>
      </svg>
      <span>Add Member</span>
    </button>
  </header>

  <!-- Loading State -->
  <div *ngIf="loading" class="full-page-loader">
    <div class="spinner"></div>
    <p>Retrieving Members...</p>
  </div>

  <div *ngIf="!loading">
    <div class="list-card">
      <div class="card-header">
        <div class="header-info">
          <h3>Member Directory</h3>
          <span class="count-badge">{{ members.length }} Total Members</span>
        </div>
      </div>

      <div class="table-container shadow-sm">
        <table class="premium-table">
          <thead>
            <tr>
              <th>PATIENT NAME</th>
              <th>GENDER</th>
              <th>AGE</th>
              <th>CONTACT</th>
              <th>ACTION</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let m of members" (click)="openMember(m)">
              <td>
                <div class="name-cell">
                  <div class="avatar-sm">{{ getAvatarInitial(m.name) }}</div>
                  <div class="name-info">
                    <span class="full-name">{{ m.name }}</span>
                    <span class="id-tag">#{{ m.memberId }}</span>
                  </div>
                </div>
              </td>
              <td>
                <span class="gender-tag" [ngClass]="m.gender.toLowerCase()">{{ m.gender }}</span>
              </td>
              <td class="semi-bold">{{ getAge(m) }} yrs</td>
              <td>
                <div class="contact-cell">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                      d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                    </path>
                  </svg>
                  <span>{{ m.contact }}</span>
                </div>
              </td>
              <td class="action-cell">
                <button class="btn-icon-view" title="View Details">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12s2.545-5 7-5 7 5 7 5-2.545 5-7 5-7-5-7-5z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- Empty State -->
        <div *ngIf="members.length === 0" class="empty-state">
          <div class="empty-icon">📭</div>
          <p>No members found in the directory.</p>
          <button class="btn btn-outline" (click)="addMember()">Add your first member</button>
        </div>
      </div>
    </div>
  </div>
</div>
